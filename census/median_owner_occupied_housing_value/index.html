<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Median Home Value</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box}
  /* The body is locked to the height of the embedding <iframe> and clips
     overflow, so the chart fills the frame exactly and never produces a
     scrollbar. Control the overall size from the <iframe> height on your page:
     a taller iframe gives a taller chart, but it always fits with no scroll. */
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#1A2744;
    background:transparent;}
  /* White card fills the available height; the chart area below takes whatever
     space the header/tabs/source leave. */
  .card{display:flex;flex-direction:column;height:100%;
    max-width:960px;margin:0 auto;
    background:#fff;border:1px solid #E2E8F0;border-radius:16px;
    box-shadow:0 1px 3px rgba(16,24,40,.04);padding:16px 22px 14px;}
  .top{flex:0 0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{margin:0;font-family:Georgia,'Freight Macro Pro','Times New Roman',serif;
    font-size:1.2rem;font-weight:700;letter-spacing:-0.01em;color:#1A2744;line-height:1.2}
  .meta{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#0062A3;background:#E8F0F7;padding:3px 9px;border-radius:999px;font-size:10px}
  .updated{font-size:12px;color:#94A3B8}
  .topic{flex:0 0 auto;margin:7px 0 0;font-size:.8rem;line-height:1.45;color:#475569;max-width:88ch}
  .tabs{flex:0 0 auto;display:flex;gap:8px;margin:11px 0 0;flex-wrap:wrap}
  .tab{padding:6px 15px;border:none;border-radius:999px;background:#EEF2F6;
    font:600 12px 'DM Sans',sans-serif;color:#475569;cursor:pointer;transition:all .15s}
  .tab:hover{background:#E2E8F0}
  .tab.active{background:#0062A3;color:#fff}
  /* Framed white chart area. Flexes to fill whatever height the card has after
     the header/tabs/source. The card's min-height floor (and your iframe height)
     control the overall size; min-height:0 here lets it flex correctly. */
  .chartcard{flex:1 1 auto;min-height:0;position:relative;margin-top:11px;
    border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;background:#fff}
  .view{position:absolute;inset:0;width:100%;height:100%;border:none}
  .source-row{flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:11px;
    padding-top:10px;border-top:1px solid #EEF2F6}
  .src-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#94A3B8;margin-right:4px}
  .dl{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    padding:7px 16px;border:1.5px solid #CBD5E1;border-radius:999px;
    font:600 13px 'DM Sans',sans-serif;color:#0062A3;transition:all .15s}
  .dl:hover{background:#F1F5F9;border-color:#3B8FCC}
</style>
</head><body>
<div class="card">
  <div class="top">
    <h1>Median Home Value</h1>
    <div class="meta"><span class="badge">census</span><span class="updated">Updated Jun 15, 2026</span></div>
  </div>
  <p class="topic">The median home value for owner-occupied homes.</p>
  <div class="tabs"><button class="tab active" onclick="showTab(0)">Bar Chart</button><button class="tab" onclick="showTab(1)">Trend</button><button class="tab" onclick="showTab(2)">Map</button></div>
  <div class="chartcard"><iframe class="view" id="f0" scrolling="no" style="visibility:visible;z-index:2" src="../_views/Output_Median_Owner_Occupied_Housing_Value_v2/bar_final_median_owner_occupied_housing_value.html"></iframe><iframe class="view" id="f1" scrolling="no" style="visibility:hidden;z-index:1" src="../_views/Output_Median_Owner_Occupied_Housing_Value_v2/line_final_median_owner_occupied_housing_value.html"></iframe><iframe class="view" id="f2" scrolling="no" style="visibility:hidden;z-index:1" src="../_views/Output_Median_Owner_Occupied_Housing_Value_v2/map_final_median_owner_occupied_housing_value.html"></iframe></div>
  <div class="source-row"><span class="src-label">Source data</span><a class="dl" href="data/Median_Owner_Occupied_Housing_Value_counties.csv" download><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>Counties</a><a class="dl" href="data/Median_Owner_Occupied_Housing_Value_subdivisions.csv" download><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>Subdivisions</a></div>
</div>
<script>
  function showTab(n){
    document.querySelectorAll('.view').forEach(function(v,i){
      v.style.visibility = (i===n) ? 'visible' : 'hidden';
      v.style.zIndex = (i===n) ? 2 : 1;
      // Nudge the now-visible chart to recompute its height for the active box.
      if(i===n){ try{ v.contentWindow.dispatchEvent(new Event('resize')); }catch(e){} }
    });
    document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active', i===n);});
  }
</script>
</body></html>
