<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Poverty by Race/Ethnicity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box}
  /* Page background restored (dotted panel). The body is NOT height-locked:
     it grows with content so the chart keeps a real minimum height instead of
     being crushed when the embedding iframe is short. On a tall desktop iframe
     it simply fills; on a short/mobile iframe the page scrolls. */
  html,body{margin:0;padding:18px 0;min-height:100vh;min-height:100dvh;
    font-family:'DM Sans',system-ui,sans-serif;color:#1A2744;
    background:#F0F2F5;
    background-image:radial-gradient(rgba(26,39,68,.05) 1px, transparent 1px);
    background-size:22px 22px;}
  /* White card; flex column that sizes to its content. The chart area below
     carries the real height floor. */
  .card{display:flex;flex-direction:column;max-width:1200px;margin:0 auto;
    background:#fff;border:1px solid #E2E8F0;border-radius:16px;
    box-shadow:0 1px 3px rgba(16,24,40,.04);padding:22px 24px 18px;}
  .top{flex:0 0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{margin:0;font-family:Georgia,'Freight Macro Pro','Times New Roman',serif;
    font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;color:#1A2744;line-height:1.2}
  .meta{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#0062A3;background:#E8F0F7;padding:4px 11px;border-radius:999px}
  .updated{font-size:13px;color:#94A3B8}
  .topic{flex:0 0 auto;margin:10px 0 0;font-size:.95rem;line-height:1.5;color:#475569;max-width:78ch}
  .tabs{flex:0 0 auto;display:flex;gap:8px;margin:16px 0 0;flex-wrap:wrap}
  .tab{padding:8px 18px;border:none;border-radius:999px;background:#EEF2F6;
    font:600 13px 'DM Sans',sans-serif;color:#475569;cursor:pointer;transition:all .15s}
  .tab:hover{background:#E2E8F0}
  .tab.active{background:#0062A3;color:#fff}
  /* Framed white chart area. It now has a real MINIMUM height per breakpoint so
     it can never be crushed to a line when the embedding iframe is short. It
     still flexes to fill extra space when the iframe is taller. Desktop keeps a
     compact floor (no scroll); tablet and phone get taller floors (scroll ok). */
  .chartcard{flex:1 1 auto;min-height:360px;position:relative;margin-top:16px;
    border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;background:#fff}
  @media (max-width:1024px){ .chartcard{min-height:460px} }
  @media (max-width:640px){ .chartcard{min-height:540px} }
  .view{position:absolute;inset:0;width:100%;height:100%;border:none}
  .source-row{flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:18px;
    padding-top:14px;border-top:1px solid #EEF2F6}
  .src-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#94A3B8;margin-right:4px}
  .dl{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    padding:7px 16px;border:1.5px solid #CBD5E1;border-radius:999px;
    font:600 13px 'DM Sans',sans-serif;color:#0062A3;transition:all .15s}
  .dl:hover{background:#F1F5F9;border-color:#3B8FCC}
</style>
</head><body>
<div class="card">

  </div>
  <p class="topic">This indicator compares poverty rates among seniors by race and ethnicity across the eight-county Rochester region.</p>
  <div class="tabs"><button class="tab active" onclick="showTab(0)">Bar Chart</button><button class="tab" onclick="showTab(1)">Trend</button><button class="tab" onclick="showTab(2)">Map</button></div>
  <div class="chartcard"><iframe class="view" id="f0" scrolling="no" style="visibility:visible;z-index:2" src="../_views/Output_Senior_Poverty_Race_Ethnicity_v2/bar_final_Senior_Poverty_Race_Ethnicity.html"></iframe><iframe class="view" id="f1" scrolling="no" style="visibility:hidden;z-index:1" src="../_views/Output_Senior_Poverty_Race_Ethnicity_v2/line_final_Senior_Poverty_Race_Ethnicity.html"></iframe><iframe class="view" id="f2" scrolling="no" style="visibility:hidden;z-index:1" src="../_views/Output_Senior_Poverty_Race_Ethnicity_v2/map_final_Senior_Poverty_Race_Ethnicity.html"></iframe></div>

</div>
<script>
  function showTab(n){
    document.querySelectorAll('.view').forEach(function(v,i){
      v.style.visibility = (i===n) ? 'visible' : 'hidden';
      v.style.zIndex = (i===n) ? 2 : 1;
      // Nudge the now-visible chart to recompute its height for the active box.
      if(i===n){ try{ v.contentWindow.dispatchEvent(new Event('resize')); }catch(e){} }
    });
    document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active', i===n);});
    setTimeout(postHeight, 60);
  }
  // Auto-resize: report this wrapper's natural height to the embedding page so
  // the outer <iframe> can grow to fit. With the receiver snippet in place (see
  // the embed instructions) the chart shows fully with NO inner scroll on
  // desktop; on phones the iframe just grows taller and the page scrolls. If the
  // host does not add the receiver, the fixed iframe height is used and the
  // chart still keeps its minimum height (it will not collapse to a line).
  function postHeight(){
    var card = document.querySelector('.card');
    if(!card) return;
    var h = Math.ceil(card.getBoundingClientRect().height) + 40;
    try{ parent.postMessage({ actEmbedHeight: h, src: location.pathname }, '*'); }catch(e){}
  }
  window.addEventListener('load', function(){ postHeight(); setTimeout(postHeight, 350); });
  window.addEventListener('resize', postHeight);
  if(window.ResizeObserver){
    var _c = document.querySelector('.card');
    if(_c) new ResizeObserver(postHeight).observe(_c);
  }
</script>
</body></html>
