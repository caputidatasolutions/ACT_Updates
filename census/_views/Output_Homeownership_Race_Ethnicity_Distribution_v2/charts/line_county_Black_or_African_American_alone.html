<script>
  // Fit the Plotly chart to the height it has been handed. Through nested
  // iframes the final size often settles AFTER load, so a one-shot load/resize
  // handler can capture a stale (tiny) height and leave the plot crushed. A
  // ResizeObserver re-fits whenever the document box actually changes, which is
  // what makes the chart fill its frame on every screen.
  function fitChart() {
    var gd = document.querySelector('.plotly-graph-div');
    if (!gd || !window.Plotly) return;
    var footer = document.querySelector('.source-footer');
    var footerH = footer ? footer.offsetHeight : 0;
    var h = (document.documentElement.clientHeight || window.innerHeight) - footerH;
    if (h > 60) Plotly.relayout(gd, { height: h });
  }
  window.addEventListener('load', fitChart);
  window.addEventListener('resize', fitChart);
  if (window.ResizeObserver) { new ResizeObserver(fitChart).observe(document.documentElement); }
  setTimeout(fitChart, 100);
  setTimeout(fitChart, 400);
</script>
