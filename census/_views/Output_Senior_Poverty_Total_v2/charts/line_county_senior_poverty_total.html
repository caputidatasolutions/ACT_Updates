    overflow: hidden; display: flex; flex-direction: column;
  }
  /* The Plotly chart wrapper — fill all remaining space */
  .plotly-graph-div {
    width: 100% !important;
    flex: 1 1 auto !important;
  }
  /* Source footer — fixed strip at bottom */
  .source-footer {
    flex: 0 0 auto;
    padding: 4px 12px 6px 12px;
    font-family: 'DM Sans', 'Proxima Nova, sans-serif', sans-serif;
    font-size: 9px;
    color: #94A3B8;
    background: #fff;
    border-top: 1px solid #E8ECF0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
<script>
  // After Plotly renders, force the chart to fill available height
  window.addEventListener('load', function() {
    window.dispatchEvent(new Event('resize'));
  });
  window.addEventListener('resize', function() {
    var gd = document.querySelector('.plotly-graph-div');
    if (gd) {
      var footer = document.querySelector('.source-footer');
      var footerH = footer ? footer.offsetHeight : 0;
      var newH = window.innerHeight - footerH;
      Plotly.relayout(gd, { height: newH });
    }
  });
</script>
<div class="source-footer">Source: U.S. Census Bureau, American Community Survey 5-Year Estimates, Table B17001 (2017–2024)</div>
</body>
</html>
