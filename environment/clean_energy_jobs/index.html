<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Energy Jobs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box}
  /* Fill exactly the iframe the parent gives us. Old browsers use vh; modern
     browsers override with dvh. Listing vh first prevents a zero-height card
     on a browser that does not understand dvh. */
  html,body{margin:0;padding:0;height:100vh;height:100dvh;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#1A2744;background:transparent;}
  /* Flex column: header bits take their natural size; the chart fills the rest. */
  .card{display:flex;flex-direction:column;height:100%;max-width:100%;margin:0 auto;
    background:transparent;padding:8px 14px 12px;}
  .top{flex:0 0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{margin:0;font-family:Georgia,'Freight Macro Pro','Times New Roman',serif;
    font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;color:#1A2744;line-height:1.2}
  .meta{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#0062A3;background:#E8F0F7;padding:4px 11px;border-radius:999px}
  .updated{font-size:13px;color:#94A3B8}
  .topic{flex:0 0 auto;margin:10px 0 0;font-size:.95rem;line-height:1.5;color:#475569;max-width:78ch}
  .tabs{flex:0 0 auto;display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap}
  .tab{padding:8px 18px;border:none;border-radius:999px;background:#EEF2F6;
    font:600 13px 'DM Sans',sans-serif;color:#475569;cursor:pointer;transition:all .15s}
  .tab:hover{background:#E2E8F0}
  .tab.active{background:#0062A3;color:#fff}
  /* The chart area grows to fill all remaining height. The Plotly chart inside
     reads this height and lays itself out to fit, so nothing clips. */
  .chartcard{flex:1 1 auto;position:relative;margin-top:14px;
    border:none;overflow:hidden;background:transparent}
  .view{position:absolute;inset:0;width:100%;height:100%;border:none}
  .source-row{flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:14px;
    padding-top:12px;border-top:1px solid #EEF2F6}
  .src-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#94A3B8;margin-right:4px}
  .dl{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    padding:7px 16px;border:1.5px solid #CBD5E1;border-radius:999px;
    font:600 13px 'DM Sans',sans-serif;color:#0062A3;transition:all .15s}
  .dl:hover{background:#F1F5F9;border-color:#3B8FCC}
</style>
</head><body>
<div class="card">
  <div class="top">
    <h1>Clean Energy Jobs</h1>
    <div class="meta"><span class="badge">environment</span><span class="updated">Updated Jun 07, 2026</span></div>
  </div>
  <p class="topic">This indicator shows clean energy employment across the eight-county Rochester region (Monroe, Genesee, Livingston, Orleans, Ontario, Wayne, Yates, and Seneca).</p>
  <div class="tabs"><button class="tab active" onclick="showTab(0)">Bar Chart</button><button class="tab" onclick="showTab(1)">Map</button></div>
  <div class="chartcard"><iframe class="view" id="f0" scrolling="no" style="visibility:visible;z-index:2" src="../_views/Output_Clean_Energy_Jobs/bar_final_clean_energy_jobs.html"></iframe><iframe class="view" id="f1" scrolling="no" style="visibility:hidden;z-index:1" src="../_views/Output_Clean_Energy_Jobs/map_final_clean_energy_jobs.html"></iframe></div>
  <div class="source-row"><span class="src-label">Source data</span><a class="dl" href="data/Clean Energy Jobs 2024.csv" download><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>Download CSV</a></div>
</div>
<script>
  function showTab(n){
    document.querySelectorAll('.view').forEach(function(v,i){
      v.style.visibility = (i===n) ? 'visible' : 'hidden';
      v.style.zIndex = (i===n) ? 2 : 1;
      // Nudge the now-visible chart to recompute its height for the active box.
      if(i===n){ try{ v.contentWindow.dispatchEvent(new Event('resize')); }catch(e){} }
    });
    document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active', i===n);});
  }
</script>
</body></html>
